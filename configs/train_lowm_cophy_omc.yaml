seed: 0

data:
  root: data/cophy_omc/ballsCF
  train_split: train.npz
  val_split: val.npz
  test_split: test.npz
  generate_if_missing: false
  dataset: CoPhy
  scenario: ballsCF
  mode: segm_features

ranking:
  K: 8
  H: 19
  M: 5
  seed: 123
  min_law_param_distance: 0.15
  ensure_distinct_operators_in_batch: true
  negative_types:
    - state_corrupted
    - temporal_shuffled
    - law_mismatch
    - random_impossible

model:
  object_dim: 7
  action_dim: 2
  lambda_dim: 16
  hidden_dim: 128
  context_dim: 128
  token_dim: 128
  num_layers: 2
  dropout: 0.0
  use_pairwise_energy: false
  use_mu_eval: true

training:
  seed: 0
  output_dir: runs/cophy_omc
  run_name: lowm_cophy_segm_omc_seed0
  device: auto
  epochs: 5
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 0
  train_samples_per_epoch: 1000
  val_samples: 500
  beta_kl: 0.0001
  alpha_stable: 0.1
  use_stability: true
  use_occl: false
  selection_metric: law_pair

evaluation:
  num_samples: 500
