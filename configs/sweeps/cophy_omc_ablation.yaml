base_config: configs/train_lowm_cophy_omc.yaml
sweep_dir: runs/cophy_omc/BallsCF_omc_ablation

overrides:
  data:
    root: data/cophy_omc/BallsCF
    train_split: train.npz
    val_split: val.npz
    test_split: test.npz
    generate_if_missing: false
    dataset: CoPhy
    scenario: BallsCF
    mode: state
  training:
    output_dir: runs/cophy_omc/BallsCF_omc_ablation/runs
    epochs: 30
    train_samples_per_epoch: 5000
    val_samples: 1000
    selection_metric: law_pair
  evaluation:
    num_samples: 1000

evaluation:
  enabled: true
  splits:
    - val
    - test
  ranking_checkpoint: best_law_pair.pt
  law_checkpoint: best_law_pair.pt
  num_samples: 1000
  batch_size: 64
  device: auto
  cophy_ranking: true
  cophy:
    scenario: BallsCF
    checkpoint: best_law_pair.pt
    num_samples: 1000
    batch_size: 64
    matrix_size: 16
    max_batches: 8

variants:
  - &lowm_omc_seed0
    variant: lowm_cophy_OMC
    model_type: lowm
    seed: 0
    scenario: BallsCF
    mode: state
    negative_set: all
    selection_metric: law_pair
    negative_types:
      - state_corrupted
      - temporal_shuffled
      - law_mismatch
      - random_impossible
  - <<: *lowm_omc_seed0
    seed: 1
  - <<: *lowm_omc_seed0
    seed: 2

  - &lowm_no_law_seed0
    variant: lowm_cophy_no_law_mismatch
    model_type: lowm
    seed: 0
    scenario: BallsCF
    mode: state
    negative_set: no_law_mismatch
    selection_metric: law_pair
    negative_types:
      - state_corrupted
      - temporal_shuffled
      - random_impossible
  - <<: *lowm_no_law_seed0
    seed: 1
  - <<: *lowm_no_law_seed0
    seed: 2

  - &direct_omc_seed0
    variant: direct_context_cophy_OMC
    model_type: direct_context_energy
    seed: 0
    scenario: BallsCF
    mode: state
    negative_set: all
    selection_metric: law_pair
    negative_types:
      - state_corrupted
      - temporal_shuffled
      - law_mismatch
      - random_impossible
  - <<: *direct_omc_seed0
    seed: 1
  - <<: *direct_omc_seed0
    seed: 2

  - &direct_no_law_seed0
    variant: direct_context_cophy_no_law_mismatch
    model_type: direct_context_energy
    seed: 0
    scenario: BallsCF
    mode: state
    negative_set: no_law_mismatch
    selection_metric: law_pair
    negative_types:
      - state_corrupted
      - temporal_shuffled
      - random_impossible
  - <<: *direct_no_law_seed0
    seed: 1
  - <<: *direct_no_law_seed0
    seed: 2
