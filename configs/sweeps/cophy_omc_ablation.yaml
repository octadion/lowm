base_config: configs/train_lowm_cophy_omc.yaml
sweep_dir: runs/cophy_omc/ballsCF_segm_debug

# Debug sweep: seed 0, 5 epochs. For full runs, set sweep_dir to a full
# directory, epochs to 30, train_samples_per_epoch to 5000, and duplicate each
# variant for seeds 1 and 2.

overrides:
  data:
    root: data/cophy_omc/ballsCF
    train_split: train.npz
    val_split: val.npz
    test_split: test.npz
    generate_if_missing: false
    dataset: CoPhy
    scenario: ballsCF
    mode: segm_features
  training:
    output_dir: runs/cophy_omc/ballsCF_segm_debug/runs
    epochs: 5
    train_samples_per_epoch: 1000
    val_samples: 500
    selection_metric: law_pair
  evaluation:
    num_samples: 500

evaluation:
  enabled: true
  splits:
    - val
    - test
  ranking_checkpoint: best_law_pair.pt
  law_checkpoint: best_law_pair.pt
  num_samples: 500
  batch_size: 64
  device: auto
  cophy_ranking: true
  cophy:
    scenario: ballsCF
    checkpoint: best_law_pair.pt
    num_samples: 500
    batch_size: 64
    matrix_size: 16
    max_batches: 8

variants:
  - &lowm_omc_seed0
    variant: lowm_cophy_OMC
    model_type: lowm
    seed: 0
    scenario: ballsCF
    mode: segm_features
    negative_set: all
    selection_metric: law_pair
    negative_types:
      - state_corrupted
      - temporal_shuffled
      - law_mismatch
      - random_impossible

  - &lowm_no_law_seed0
    variant: lowm_cophy_no_law_mismatch
    model_type: lowm
    seed: 0
    scenario: ballsCF
    mode: segm_features
    negative_set: no_law_mismatch
    selection_metric: law_pair
    negative_types:
      - state_corrupted
      - temporal_shuffled
      - random_impossible

  - &direct_omc_seed0
    variant: direct_context_cophy_OMC
    model_type: direct_context_energy
    seed: 0
    scenario: ballsCF
    mode: segm_features
    negative_set: all
    selection_metric: law_pair
    negative_types:
      - state_corrupted
      - temporal_shuffled
      - law_mismatch
      - random_impossible

  - &direct_no_law_seed0
    variant: direct_context_cophy_no_law_mismatch
    model_type: direct_context_energy
    seed: 0
    scenario: ballsCF
    mode: segm_features
    negative_set: no_law_mismatch
    selection_metric: law_pair
    negative_types:
      - state_corrupted
      - temporal_shuffled
      - random_impossible
