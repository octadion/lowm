base_config: configs/train_lowm_occl.yaml
sweep_dir: runs/lowm_synth_v0/lowm_occl_ablation

parameters:
  alpha_occl: [0.0, 0.1, 0.5, 1.0, 2.0]
  lambda_dim: [4, 8, 16, 32]
  use_pairwise_energy: [true, false]
  use_stability: [true, false]
  beta_kl: [0.0, 1.0e-5, 1.0e-4, 1.0e-3]
  seed: [0, 1, 2]

evaluation:
  enabled: true
  split: val
  ranking_checkpoint: best_law_pair.pt
  law_checkpoint: best_law_pair.pt
  occl_checkpoint: best_occl_acc.pt
  num_samples: 1000
  batch_size: 64
  device: auto
