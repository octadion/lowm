base_config: configs/train_lowm_occl.yaml
sweep_dir: runs/lowm_synth_ood_param/main

overrides:
  data:
    root: data/lowm_synth_ood_param
    train_split: train.npz
    val_split: val.npz
    test_iid_split: test_iid.npz
    test_ood_param_split: test_ood_param.npz
    generate_if_missing: true
    dataset_config: configs/lowm_synth_ood_param.yaml
  training:
    output_dir: runs/lowm_synth_ood_param/main/runs
    epochs: 30
    train_samples_per_epoch: 5000
    val_samples: 1000
    selection_metric: law_pair
  evaluation:
    num_samples: 1000

evaluation:
  enabled: true
  splits:
    - val
    - test_iid
    - test_ood_param
  ranking_checkpoint: best_law_pair.pt
  law_checkpoint: best_law_pair.pt
  occl_checkpoint: best_occl_acc.pt

variants:
  - &direct_context_seed0
    variant: direct_context_energy
    model_type: direct_context_energy
    alpha_occl: 0.0
    lambda_dim: 16
    use_pairwise_energy: false
    use_stability: true
    beta_kl: 0.0001
    selection_metric: law_pair
    seed: 0
    negative_set: all
    negative_types: &all_negatives
      - state_corrupted
      - temporal_shuffled
      - law_mismatch
      - random_impossible
  - <<: *direct_context_seed0
    seed: 1
  - <<: *direct_context_seed0
    seed: 2

  - &lowm_omcr_seed0
    variant: lowm_omcr_no_pairwise
    model_type: lowm
    alpha_occl: 0.0
    lambda_dim: 16
    use_pairwise_energy: false
    use_stability: true
    beta_kl: 0.0001
    selection_metric: law_pair
    seed: 0
    negative_set: all
    negative_types: *all_negatives
  - <<: *lowm_omcr_seed0
    seed: 1
  - <<: *lowm_omcr_seed0
    seed: 2

  - &no_law_seed0
    variant: no_law_mismatch
    model_type: lowm
    alpha_occl: 0.0
    lambda_dim: 16
    use_pairwise_energy: false
    use_stability: true
    beta_kl: 0.0001
    selection_metric: law_pair
    seed: 0
    negative_set: no_law_mismatch
    negative_types:
      - state_corrupted
      - temporal_shuffled
      - random_impossible
  - <<: *no_law_seed0
    seed: 1
  - <<: *no_law_seed0
    seed: 2
